async function installUpdates() {
  const btn = document.getElementById('checkUpdatesBtn');
  const banner = document.getElementById('updateBanner');
  btn.disabled = true;
  btn.textContent = 'Checking...';
  banner.innerHTML = '';

  try {
    // Step 1: Check for updates
    const res = await fetch('/api/check-updates', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}'});
    const data = await res.json();

    if (data.errors && data.errors.length > 0) {
      banner.innerHTML += `<div class="update-banner" style="color:#8B5E00;border-color:#F5A623;background:#FFF8E1;">${data.errors.map(e => esc(e)).join('<br>')}</div>`;
    }

    if (!data.updates || data.updates.length === 0) {
      banner.innerHTML = `<div class="update-banner" style="color:var(--green);border-color:var(--green);background:#E8F7D4;">All plugins are up to date.</div>`;
      setTimeout(() => { banner.innerHTML = ''; }, 4000);
      btn.textContent = 'Install updates';
      btn.disabled = false;
      return;
    }

    // Step 2: Auto-install all updates
    const total = data.updates.length;
    let installed = 0;
    let failed = [];

    banner.innerHTML += `<div class="update-banner" id="updateProgress">
      <div style="margin-bottom:6px;font-weight:600">Installing ${total} update${total > 1 ? 's' : ''}...</div>
      ${data.updates.map(u => `<div class="update-banner-row" id="update-row-${esc(u.plugin_id.replace(/[@.]/g, '-'))}">
        <span class="plugin-name-text">${esc(u.name)}</span>
        <span class="version-info">${esc(u.installed_version)} &rarr; ${esc(u.available_version)}</span>
        <span class="update-status" style="margin-left:auto;font-size:11px;color:var(--text-muted)">waiting...</span>
      </div>`).join('')}
    </div>`;

    btn.textContent = `Updating 0/${total}...`;

    for (const u of data.updates) {
      const rowId = `update-row-${u.plugin_id.replace(/[@.]/g, '-')}`;
      const statusEl = document.querySelector(`#${CSS.escape(rowId)} .update-status`);
      if (statusEl) { statusEl.textContent = 'installing...'; statusEl.style.color = 'var(--blue)'; }

      try {
        const ures = await fetch('/api/update-plugin', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({plugin_id: u.plugin_id})
        });
        const udata = await ures.json();
        if (udata.ok) {
          installed++;
          if (statusEl) { statusEl.textContent = 'done'; statusEl.style.color = 'var(--green)'; }
        } else {
          failed.push(u.name);
          if (statusEl) { statusEl.textContent = 'failed'; statusEl.style.color = 'var(--red)'; }
        }
      } catch (e) {
        failed.push(u.name);
        if (statusEl) { statusEl.textContent = 'error'; statusEl.style.color = 'var(--red)'; }
      }
      btn.textContent = `Updating ${installed + failed.length}/${total}...`;
    }

    // Step 3: Show results
    if (failed.length === 0) {
      btn.textContent = `Updated ${installed} plugin${installed > 1 ? 's' : ''}!`;
      setTimeout(() => location.reload(), 1500);
    } else {
      btn.textContent = 'Install updates';
      btn.disabled = false;
      modalAlert(`Failed to update: ${failed.join(', ')}`);
    }
  } catch (e) {
    banner.innerHTML = `<div class="update-banner" style="color:var(--red);border-color:var(--red);background:#FFE6E9;">Error: ${esc(e.message)}</div>`;
    btn.textContent = 'Install updates';
    btn.disabled = false;
  }
}

async function upgradePlugin(badge) {
  const pluginId = badge.dataset.pluginId;
  if (!pluginId) { modalAlert('No plugin ID available for upgrade'); return; }
  if (!await modalConfirm(`Upgrade ${pluginId}?`)) return;
  badge.style.opacity = '0.5';
  badge.style.pointerEvents = 'none';
  const origHtml = badge.innerHTML;
  badge.textContent = 'upgrading...';
  try {
    const res = await fetch('/api/update-plugin', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({plugin_id: pluginId})
    });
    const data = await res.json();
    if (data.ok) {
      badge.textContent = 'done!';
      badge.className = 'version-badge version-current';
      setTimeout(() => location.reload(), 1000);
    } else {
      modalAlert('Upgrade failed:\n' + (data.stderr || data.stdout || 'Unknown error'));
      badge.innerHTML = origHtml;
      badge.style.opacity = '';
      badge.style.pointerEvents = '';
    }
  } catch (e) {
    modalAlert('Upgrade error: ' + e.message);
    badge.innerHTML = origHtml;
    badge.style.opacity = '';
    badge.style.pointerEvents = '';
  }
}

async function moveSkillToScanned(btn) {
  const absPath = btn.dataset.absPath;
  const name = btn.dataset.skillName;
  if (!await modalConfirm(`Copy "${name}" to ~/.claude/skills/${name}/?\n\nThis makes it discoverable by Claude Code and available to subagents.`)) return;
  btn.disabled = true;
  btn.textContent = 'copying...';
  try {
    const res = await fetch('/api/move-skill-to-scanned', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({abs_path: absPath, name: name})
    });
    const data = await res.json();
    if (data.ok) {
      btn.textContent = 'done!';
      setTimeout(() => location.reload(), 1000);
    } else {
      modalAlert('Failed: ' + (data.error || 'Unknown error'));
      btn.textContent = 'add to skills/';
      btn.disabled = false;
    }
  } catch (e) {
    modalAlert('Error: ' + e.message);
    btn.textContent = 'add to skills/';
    btn.disabled = false;
  }
}

async function toggleModelInvocation(badge) {
  const absPath = badge.dataset.absPath;
  const currentlyDisabled = badge.textContent.trim() === 'manual';
  const newDisable = !currentlyDisabled;
  const action = newDisable ? 'Disable model invocation (make manual only)?' : 'Enable model invocation (allow agents to trigger this)?';
  if (!await modalConfirm(action)) return;
  badge.style.opacity = '0.5';
  try {
    const res = await fetch('/api/toggle-model-invocation', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({abs_path: absPath, disable: newDisable})
    });
    if (!res.ok) {
      const text = await res.text();
      modalAlert('Server error: ' + (text || res.status));
      badge.style.opacity = '';
      return;
    }
    const data = await res.json();
    if (data.ok) {
      if (newDisable) {
        badge.textContent = 'manual';
      } else {
        badge.remove();
      }
    } else {
      modalAlert('Failed: ' + (data.error || 'Unknown error'));
    }
  } catch (e) {
    modalAlert('Error: ' + e.message);
  }
  badge.style.opacity = '';
}

function applyFilter() {
  const sections = document.querySelectorAll('.section');
  const plugins = document.querySelectorAll('.plugin');
  const query = document.getElementById('search').value.toLowerCase().trim();

  sections.forEach(s => s.classList.remove('hidden'));
  plugins.forEach(p => p.classList.remove('hidden'));
  document.querySelectorAll('.skill').forEach(s => s.classList.remove('hidden'));
  document.querySelectorAll('.component-section').forEach(s => s.classList.remove('hidden'));
  document.querySelectorAll('.unscanned-section').forEach(s => s.classList.remove('hidden'));
  document.querySelectorAll('.component-row').forEach(r => r.classList.remove('hidden'));
  document.querySelectorAll('.mp-subheader-wrap').forEach(s => s.classList.remove('hidden'));
  document.querySelectorAll('.marketplace-body > .component-section-header').forEach(s => s.classList.remove('hidden'));

  // Hide marketplaces section by default (unless marketplaces filter active)
  if (activeFilter !== 'marketplaces') {
    document.querySelector('[data-source="marketplaces"]')?.classList.add('hidden');
  }

  if (activeFilter === 'all') {
    document.querySelector('[data-source="available"]')?.classList.add('hidden');
  } else if (activeFilter === 'available') {
    document.querySelector('[data-source="installed"]')?.classList.add('hidden');
  } else if (activeFilter === 'duplicates') {
    document.querySelector('[data-source="available"]')?.classList.add('hidden');
    document.querySelectorAll('[data-source="installed"] .skill').forEach(s => {
      if (s.dataset.isDuplicate !== 'true') s.classList.add('hidden');
    });
    document.querySelectorAll('[data-source="installed"] .component-section').forEach(s => s.classList.add('hidden'));
    document.querySelectorAll('[data-source="installed"] .unscanned-section').forEach(s => s.classList.add('hidden'));
  } else if (activeFilter === 'issues') {
    document.querySelector('[data-source="available"]')?.classList.add('hidden');
    document.querySelectorAll('[data-source="installed"] .skill').forEach(s => {
      if (s.dataset.hasIssues !== 'true') s.classList.add('hidden');
    });
    // Hide non-command component sections; filter command rows by issues
    document.querySelectorAll('[data-source="installed"] .component-section').forEach(s => {
      const tag = s.querySelector('.mp-tag');
      if (tag && tag.textContent.trim() !== 'Commands') s.classList.add('hidden');
    });
    document.querySelectorAll('[data-source="installed"] .component-row[data-component-type="command"]').forEach(r => {
      if (r.dataset.hasIssues !== 'true') r.classList.add('hidden');
    });
    document.querySelectorAll('[data-source="installed"] .unscanned-section').forEach(s => s.classList.add('hidden'));
  } else if (activeFilter === 'stale') {
    document.querySelector('[data-source="available"]')?.classList.add('hidden');
    document.querySelectorAll('[data-source="installed"] .skill').forEach(s => {
      if (s.dataset.hasUpdate !== 'true') s.classList.add('hidden');
    });
    document.querySelectorAll('[data-source="installed"] .component-section').forEach(s => s.classList.add('hidden'));
    document.querySelectorAll('[data-source="installed"] .unscanned-section').forEach(s => s.classList.add('hidden'));
  } else if (activeFilter === 'marketplaces') {
    document.querySelector('[data-source="installed"]')?.classList.add('hidden');
    document.querySelector('[data-source="available"]')?.classList.add('hidden');
    const mpSection = document.querySelector('[data-source="marketplaces"]');
    if (mpSection) {
      mpSection.classList.remove('hidden', 'collapsed');
    }
  }

  if (query) {
    document.querySelectorAll('.skill').forEach(s => {
      const match = s.dataset.name.includes(query) || s.dataset.desc.includes(query);
      if (!match) s.classList.add('hidden');
    });
    // Also search component rows (agents, hooks, mcp servers)
    document.querySelectorAll('.component-row').forEach(r => {
      const name = r.dataset.componentName || '';
      const text = r.textContent.toLowerCase();
      if (!name.includes(query) && !text.includes(query)) r.classList.add('hidden');
    });
    // Also search plugin names — unhide all children if plugin name matches
    plugins.forEach(p => {
      if (p.dataset.plugin && p.dataset.plugin.toLowerCase().includes(query)) {
        p.querySelectorAll('.skill').forEach(s => s.classList.remove('hidden'));
        p.querySelectorAll('.component-row').forEach(r => r.classList.remove('hidden'));
      }
    });
  }

  plugins.forEach(p => {
    const visSkills = p.querySelectorAll('.plugin-body > .skill:not(.hidden)');
    const visComponents = p.querySelectorAll('.component-section:not(.hidden) .component-row:not(.hidden)');
    if (visSkills.length === 0 && visComponents.length === 0) p.classList.add('hidden');
  });

  // Hide marketplace subheaders when all their plugins are hidden
  document.querySelectorAll('.mp-subheader-wrap').forEach(wrap => {
    // Find the next sibling plugins until the next subheader or end
    let hasVisible = false;
    let sibling = wrap.nextElementSibling;
    while (sibling && !sibling.classList.contains('mp-subheader-wrap') && !sibling.classList.contains('component-section-header')) {
      if (sibling.classList.contains('plugin') && !sibling.classList.contains('hidden')) {
        hasVisible = true;
        break;
      }
      sibling = sibling.nextElementSibling;
    }
    wrap.classList.toggle('hidden', !hasVisible);
  });

  // Also hide local-plugin subheaders when empty (only direct children of marketplace-body)
  document.querySelectorAll('.marketplace-body > .component-section-header').forEach(hdr => {
    let hasVisible = false;
    let sibling = hdr.nextElementSibling;
    while (sibling && !sibling.classList.contains('mp-subheader-wrap') && !(sibling.classList.contains('component-section-header') && sibling.parentElement.classList.contains('marketplace-body'))) {
      if (sibling.classList.contains('plugin') && !sibling.classList.contains('hidden')) {
        hasVisible = true;
        break;
      }
      sibling = sibling.nextElementSibling;
    }
    hdr.classList.toggle('hidden', !hasVisible);
  });

  sections.forEach(s => {
    if (s.dataset.noAutoHide) return;
    const vis = s.querySelectorAll('.plugin:not(.hidden)');
    if (vis.length === 0 && !s.classList.contains('hidden')) s.classList.add('hidden');
  });
}

// Init
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilter();
  });
});

document.getElementById('search').addEventListener('input', applyFilter);

Promise.all([fetchData(), fetchMarketplaces()])
  .then(([data, mpData]) => {
    DATA = data;
    MP_DATA = mpData;
    renderStats(data);
    renderAll(data, mpData);
    applyFilter();
  })
  .catch(err => {
    document.getElementById('content').innerHTML =
      `<div class="error">Failed to load: ${esc(err.message)}<br>Is serve.py running?</div>`;
  });
</script>
